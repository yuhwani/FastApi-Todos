<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* 입력 폼 */
        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .form-card input[type="text"] {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-card input[type="text"]:focus { border-color: #6c63ff; }

        /* 날짜 행 */
        .date-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-label {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
        }

        .date-row input[type="date"] {
            flex: 1;
            min-width: 130px;
            padding: 8px 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            color: #333;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .date-row input[type="date"]:focus { border-color: #6c63ff; }

        .date-separator {
            font-size: 13px;
            color: #aaa;
            font-weight: 500;
        }

        .btn-add {
            padding: 10px 20px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            align-self: flex-end;
        }

        .btn-add:hover { background: #574fd6; }

        /* Todo 카드 */
        .todo-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 12px;
            transition: opacity 0.2s;
            border-left: 4px solid transparent;
        }

        .todo-card.completed { opacity: 0.55; border-left-color: #b0b0b0; }
        .todo-card.overdue   { border-left-color: #e74c3c; }
        .todo-card.due-today { border-left-color: #f39c12; }
        .todo-card.on-track  { border-left-color: #2ecc71; }

        .todo-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        /* 토글 체크박스 */
        .toggle {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border-radius: 50%;
            border: 2px solid #6c63ff;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            transition: background 0.2s, border-color 0.2s;
        }

        .toggle.done {
            background: #6c63ff;
            border-color: #6c63ff;
        }

        .toggle.done::after {
            content: '';
            width: 6px;
            height: 10px;
            border: 2px solid #fff;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translateY(-1px);
        }

        .todo-text { flex: 1; min-width: 0; }

        .todo-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .todo-card.completed .todo-title {
            text-decoration: line-through;
            color: #999;
        }

        .todo-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        /* 날짜 배지 */
        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 20px;
            margin-top: 2px;
        }

        .date-badge.overdue   { background: #ffeaea; color: #e74c3c; }
        .date-badge.due-today { background: #fff5e0; color: #f39c12; }
        .date-badge.on-track  { background: #eafaf1; color: #27ae60; }
        .date-badge.no-date   { background: #f4f4f4; color: #aaa; }

        .todo-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-icon {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-edit { background: #f0eeff; color: #6c63ff; }
        .btn-edit:hover { background: #e0dbff; }
        .btn-del { background: #fff0f0; color: #e74c3c; }
        .btn-del:hover { background: #ffd9d9; }

        /* 댓글 영역 */
        .comments-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f0; }

        .comment-item {
            font-size: 13px;
            color: #444;
            padding: 5px 10px;
            background: #f8f8fc;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .comment-form {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .comment-form input {
            flex: 1;
            padding: 7px 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .comment-form input:focus { border-color: #6c63ff; }

        .btn-comment {
            padding: 7px 14px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-comment:hover { background: #574fd6; }

        .empty {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            padding: 40px 0;
        }

        /* 날짜 수정 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal h2 { font-size: 18px; color: #1a1a2e; }

        .modal label {
            font-size: 13px;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal input {
            padding: 9px 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal input:focus { border-color: #6c63ff; }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .btn-cancel {
            padding: 9px 18px;
            background: #f4f4f4;
            color: #555;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save {
            padding: 9px 18px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save:hover { background: #574fd6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>할 일 목록</h1>

        <!-- 추가 폼 -->
        <div class="form-card">
            <div class="form-row">
                <input type="text" id="title" placeholder="제목" required>
                <input type="text" id="description" placeholder="설명">
            </div>
            <div class="date-row">
                <span class="date-label">시작</span>
                <input type="date" id="start_date">
                <span class="date-separator">~</span>
                <span class="date-label">마감</span>
                <input type="date" id="end_date">
            </div>
            <button class="btn-add" onclick="addTodo()">+ 추가</button>
        </div>

        <div id="todo-list"></div>
    </div>

    <!-- 수정 모달 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>할 일 수정</h2>
            <label>제목 <input type="text" id="m-title"></label>
            <label>설명 <input type="text" id="m-desc"></label>
            <label>시작 날짜 <input type="date" id="m-start"></label>
            <label>마감 날짜 <input type="date" id="m-end"></label>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-save" onclick="saveEdit()">저장</button>
            </div>
        </div>
    </div>

    <script>
        let editingId = null;
        let editingCompleted = false;

        // ── 날짜 상태 판별 ──────────────────────────
        function getDeadlineStatus(endDate, completed) {
            if (completed) return 'completed';
            if (!endDate) return 'no-date';
            const today = new Date().toISOString().slice(0, 10);
            if (endDate < today) return 'overdue';
            if (endDate === today) return 'due-today';
            return 'on-track';
        }

        function badgeLabel(status, startDate, endDate) {
            const fmt = d => d ? d.replace(/-/g, '.') : '';
            if (status === 'no-date') {
                return startDate
                    ? `<span class="date-badge no-date">📅 ${fmt(startDate)} ~</span>`
                    : '';
            }
            const range = startDate ? `${fmt(startDate)} ~ ${fmt(endDate)}` : `~ ${fmt(endDate)}`;
            const icons = { overdue: '🔴', 'due-today': '🟡', 'on-track': '🟢' };
            const labels = { overdue: '기한 초과', 'due-today': '오늘 마감', 'on-track': '' };
            return `<span class="date-badge ${status}">${icons[status]} ${labels[status] ? labels[status] + ' · ' : ''}${range}</span>`;
        }

        // ── 목록 렌더 ────────────────────────────────
        async function fetchTodos() {
            const res = await fetch('/todos');
            const todos = await res.json();
            const list = document.getElementById('todo-list');
            list.innerHTML = '';

            if (todos.length === 0) {
                list.innerHTML = '<div class="empty">할 일이 없습니다 🎉</div>';
                return;
            }

            todos.forEach(todo => {
                const status = getDeadlineStatus(todo.end_date, todo.completed);
                const card = document.createElement('div');
                card.className = 'todo-card' + (todo.completed ? ' completed' : status !== 'no-date' ? ` ${status}` : '');

                const commentsHtml = (todo.comments || [])
                    .map(c => `<div class="comment-item">💬 ${c.content}</div>`)
                    .join('');

                card.innerHTML = `
                    <div class="todo-header">
                        <div class="toggle ${todo.completed ? 'done' : ''}" onclick="toggleTodo(${todo.id})"></div>
                        <div class="todo-text">
                            <div class="todo-title">${todo.title}</div>
                            <div class="todo-desc">${todo.description}</div>
                            ${badgeLabel(status, todo.start_date, todo.end_date)}
                        </div>
                        <div class="todo-actions">
                            <button class="btn-icon btn-edit" onclick="openModal(${todo.id})">수정</button>
                            <button class="btn-icon btn-del" onclick="deleteTodo(${todo.id})">삭제</button>
                        </div>
                    </div>
                    <div class="comments-section">
                        ${commentsHtml}
                        <div class="comment-form">
                            <input id="comment-${todo.id}" placeholder="댓글 입력..." />
                            <button class="btn-comment" onclick="addComment(${todo.id})">등록</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // ── 추가 ─────────────────────────────────────
        async function addTodo() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const start_date = document.getElementById('start_date').value || null;
            const end_date = document.getElementById('end_date').value || null;
            if (!title) return;

            await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: Date.now(), title, description, completed: false, start_date, end_date })
            });

            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('start_date').value = '';
            document.getElementById('end_date').value = '';
            fetchTodos();
        }

        // ── 토글 ─────────────────────────────────────
        async function toggleTodo(id) {
            await fetch(`/todos/${id}/toggle`, { method: 'PATCH' });
            fetchTodos();
        }

        // ── 수정 모달 ─────────────────────────────────
        async function openModal(id) {
            const res = await fetch('/todos');
            const todos = await res.json();
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            editingId = id;
            editingCompleted = todo.completed;

            document.getElementById('m-title').value = todo.title;
            document.getElementById('m-desc').value = todo.description;
            document.getElementById('m-start').value = todo.start_date || '';
            document.getElementById('m-end').value = todo.end_date || '';
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            editingId = null;
        }

        async function saveEdit() {
            const title = document.getElementById('m-title').value.trim();
            const description = document.getElementById('m-desc').value.trim();
            const start_date = document.getElementById('m-start').value || null;
            const end_date = document.getElementById('m-end').value || null;
            if (!title) return;

            await fetch(`/todos/${editingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: editingId, title, description, completed: editingCompleted, start_date, end_date })
            });
            closeModal();
            fetchTodos();
        }

        // ── 삭제 ─────────────────────────────────────
        async function deleteTodo(id) {
            if (!confirm('정말 삭제할까요?')) return;
            await fetch(`/todos/${id}`, { method: 'DELETE' });
            fetchTodos();
        }

        // ── 댓글 ─────────────────────────────────────
        async function addComment(todoId) {
            const input = document.getElementById(`comment-${todoId}`);
            const content = input.value.trim();
            if (!content) return;

            await fetch(`/todos/${todoId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            input.value = '';
            fetchTodos();
        }

        // 모달 외부 클릭 시 닫기
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Enter 키로 Todo 추가
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.activeElement.id === 'title') addTodo();
            if (e.key === 'Escape') closeModal();
        });

        fetchTodos();
    </script>
</body>
</html>
